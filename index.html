<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVS Links Downloader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2L12 15M12 15L8 11M12 15L16 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 17V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="header-title">CVS Links Downloader</span>
    </div>
    <div class="header-badges" id="headerBadges"></div>
  </header>

  <!-- ── Setup panel ────────────────────────────────────────── -->
  <section class="setup-panel" id="setupPanel">
    <div class="setup-row">
      <label class="setup-label">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4zM5 4V2.5A.5.5 0 015.5 2h5a.5.5 0 01.5.5V4" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        CSV File
      </label>
      <div class="setup-input-group">
        <input id="csvPath" class="setup-input" type="text" readonly placeholder="Select a .csv or .txt file containing download URLs…" />
        <button id="csvBrowse" class="btn btn-secondary btn-sm">Browse</button>
      </div>
      <span id="csvCount" class="setup-badge hidden"></span>
    </div>

    <div class="setup-row">
      <label class="setup-label">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M1 4.5A1.5 1.5 0 012.5 3H6l1.5 1.5H13.5A1.5 1.5 0 0115 6v6a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 12V4.5z" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        Destination
      </label>
      <div class="setup-input-group">
        <input id="folderPath" class="setup-input" type="text" readonly placeholder="Select destination folder…" />
        <button id="folderBrowse" class="btn btn-secondary btn-sm">Browse</button>
      </div>
    </div>

    <div class="setup-actions">
      <div class="concurrency-control">
        <label class="concurrency-label" for="concurrencySlider">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 3v10M8 3v10M13 3v10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <rect x="1" y="5" width="4" height="4" rx="1" fill="currentColor" opacity=".6"/>
            <rect x="6" y="7" width="4" height="4" rx="1" fill="currentColor" opacity=".6"/>
            <rect x="11" y="4" width="4" height="4" rx="1" fill="currentColor" opacity=".6"/>
          </svg>
          Concurrent
        </label>
        <input id="concurrencySlider" type="range" min="1" max="16" value="4" class="concurrency-slider" />
        <span id="concurrencyVal" class="concurrency-value">4</span>
      </div>

      <div class="action-buttons">
        <button id="btnStart"  class="btn btn-primary"  disabled>
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 3.5l9 4.5-9 4.5V3.5z"/></svg>
          Start Downloads
        </button>
        <button id="btnCancel" class="btn btn-danger hidden">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          Cancel
        </button>
        <button id="btnRetry"  class="btn btn-warning hidden">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 8a6 6 0 1110.93-3H10M10 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Retry Failed (<span id="retryCount">0</span>)
        </button>
        <button id="btnReset"  class="btn btn-secondary hidden">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M1 1v5h5M2.1 9A7 7 0 1013 3.35" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          New Session
        </button>
      </div>
    </div>
  </section>

  <!-- ── Dashboard ─────────────────────────────────────────── -->
  <section class="dashboard" id="dashboard">

    <!-- Overall progress ring + stats -->
    <div class="panel panel-progress">
      <div class="panel-header">
        <span class="panel-title">Overall Progress</span>
        <span id="overallStatus" class="status-chip chip-idle">Idle</span>
      </div>
      <div class="progress-ring-area">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ring-track" cx="60" cy="60" r="52" />
            <circle id="ringFill" class="ring-fill" cx="60" cy="60" r="52"
                    stroke-dasharray="326.73" stroke-dashoffset="326.73"
                    transform="rotate(-90 60 60)" />
          </svg>
          <div class="ring-inner">
            <div id="ringPct"  class="ring-pct">0%</div>
            <div id="ringSub"  class="ring-sub">0 / 0</div>
          </div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-label">Completed</div>
          <div id="statCompleted" class="stat-value val-success">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Failed</div>
          <div id="statFailed" class="stat-value val-error">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Active</div>
          <div id="statActive" class="stat-value val-accent">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Queued</div>
          <div id="statQueued" class="stat-value">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Downloaded</div>
          <div id="statDL" class="stat-value mono">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Total (known)</div>
          <div id="statTotal" class="stat-value mono">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Elapsed</div>
          <div id="statElapsed" class="stat-value mono">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">ETA</div>
          <div id="statETA" class="stat-value mono">—</div>
        </div>
      </div>
    </div>

    <!-- Speed chart -->
    <div class="panel panel-chart">
      <div class="panel-header">
        <span class="panel-title">Download Speed</span>
        <span id="currentSpeed" class="speed-badge">— /s</span>
      </div>
      <div class="chart-container">
        <canvas id="speedChart"></canvas>
        <div id="chartPlaceholder" class="chart-placeholder">
          <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <polyline points="2,40 10,28 18,32 26,18 34,22 42,8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".3"/>
          </svg>
          <span>Speed history will appear here</span>
        </div>
      </div>
    </div>

  </section>

  <!-- ── File list ──────────────────────────────────────────── -->
  <section class="file-list-section">
    <div class="file-list-header">
      <span class="file-list-title">Files</span>
      <div class="file-list-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="done">Done</button>
        <button class="filter-btn" data-filter="failed">Failed</button>
        <button class="filter-btn" data-filter="queued">Queued</button>
      </div>
    </div>
    <div class="file-list-cols">
      <span>File</span>
      <span>Progress</span>
      <span>Size</span>
      <span>Speed</span>
      <span>Status</span>
    </div>
    <div id="fileList" class="file-list">
      <div class="file-list-empty" id="fileListEmpty">
        No files loaded yet. Select a CSV file to begin.
      </div>
    </div>
  </section>

  <script src="renderer.js"></script>
</body>
</html>
